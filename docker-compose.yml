# docker-compose.yml — développement local uniquement
# PostgreSQL a été remplacé par Firestore (Firebase).
# Ce fichier ne sert plus qu'à lancer Redis pour BullMQ en local.
version: '3.9'
services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  redis_data:
