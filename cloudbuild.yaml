steps:
  # ── Build image Next.js ────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-app
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/dealfly-app:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # ── Build image Worker ─────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-worker
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/dealfly-worker:latest'
      - '-f'
      - 'Dockerfile.worker'
      - '.'

  # ── Push images ────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-app
    args: ['push', 'gcr.io/$PROJECT_ID/dealfly-app:latest']
    waitFor: ['build-app']

  - name: 'gcr.io/cloud-builders/docker'
    id: push-worker
    args: ['push', 'gcr.io/$PROJECT_ID/dealfly-worker:latest']
    waitFor: ['build-worker']

  # ── Deploy Next.js sur Cloud Run ──────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-app
    entrypoint: gcloud
    args:
      - run
      - deploy
      - dealfly-app
      - '--image=gcr.io/$PROJECT_ID/dealfly-app:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=dealfly-runner@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - >-
        --set-secrets=
        GOOGLE_APPLICATION_CREDENTIALS_JSON=GOOGLE_APPLICATION_CREDENTIALS_JSON:latest,
        FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,
        REDIS_URL=REDIS_URL:latest,
        RESEND_API_KEY=RESEND_API_KEY:latest,
        EMAIL_FROM=EMAIL_FROM:latest,
        NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,
        UNSUBSCRIBE_HMAC_SECRET=UNSUBSCRIBE_HMAC_SECRET:latest,
        AVIATIONSTACK_API_KEY=AVIATIONSTACK_API_KEY:latest,SERPAPI_KEY=SERPAPI_KEY:latest,RAPIDAPI_KEY=RAPIDAPI_KEY:latest,
        
        ADMIN_EMAIL=ADMIN_EMAIL:latest,
        ADMIN_PASSWORD_HASH=ADMIN_PASSWORD_HASH:latest,
        NEXT_PUBLIC_BASE_URL=NEXT_PUBLIC_BASE_URL:latest
      - '--set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1'
    waitFor: ['push-app']

  # ── Deploy Worker sur Cloud Run ────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-worker
    entrypoint: gcloud
    args:
      - run
      - deploy
      - dealfly-worker
      - '--image=gcr.io/$PROJECT_ID/dealfly-worker:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--service-account=dealfly-runner@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=1'
      - >-
        --set-secrets=
        GOOGLE_APPLICATION_CREDENTIALS_JSON=GOOGLE_APPLICATION_CREDENTIALS_JSON:latest,
        FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,
        REDIS_URL=REDIS_URL:latest,
        AVIATIONSTACK_API_KEY=AVIATIONSTACK_API_KEY:latest,SERPAPI_KEY=SERPAPI_KEY:latest,RAPIDAPI_KEY=RAPIDAPI_KEY:latest,
        
        KIWI_API_KEY=KIWI_API_KEY:latest
      - '--set-env-vars=NODE_ENV=production'
    waitFor: ['push-worker']

images:
  - 'gcr.io/$PROJECT_ID/dealfly-app:latest'
  - 'gcr.io/$PROJECT_ID/dealfly-worker:latest'

options:
  logging: CLOUD_LOGGING_ONLY
